server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server { 

    listen 443 ssl http2;
    server_name bennedistus.web.id www.bennedistus.web.id;

    ssl_certificate /etc/letsencrypt/live/bennedistus.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bennedistus.web.id/privkey.pem;

    index index.html index.php;
    
    root /var/www/html/public;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass app:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }


 }

server { 

    listen 443 ssl http2;
    server_name forge-flows.bennedistus.web.id www.forge-flows.bennedistus.web.id;

    ssl_certificate /etc/letsencrypt/live/bennedistus.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bennedistus.web.id/privkey.pem;

    index index.html;

    root /var/www/app/out;

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

}