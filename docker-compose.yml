services:

  app:
    image: bennedistus/forge-flows:v1

    container_name: forge_flows_app

    restart: unless-stopped

    expose:
      - 9000

  nginx:

    image: nginx:stable-alpine

    container_name: laravel_nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      -  .:/var/www/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - app
    
