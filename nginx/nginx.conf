server {

    listen 80;

    server_name bennedistus.web.id;
    root /var/www/html; 

    location / {
        index index.php index.html;
    }

    location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:8000;
            fastcgi_index index;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name
         }

}