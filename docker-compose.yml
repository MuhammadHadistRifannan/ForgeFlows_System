services:

  app:
    build: .

    container_name: bennedistus/forge-flows:v1

    restart: unless-stopped

    expose:
      - "9000"

  nginx:

    image: nginx:stable-alpine

    container_name: laravel_nginx

    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - app